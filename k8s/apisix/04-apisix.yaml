# ─────────────────────────────────────────────────────────
#  Apache APISIX — API Gateway
#  NodePort 30080 = HTTP gateway traffic
#  NodePort 30180 = Admin API (for route configuration)
#  NodePort 30091 = Prometheus metrics
# ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix
  namespace: apisix
  labels:
    app: apisix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apisix
  template:
    metadata:
      labels:
        app: apisix
    spec:
      initContainers:
        # Wait for etcd to be ready before starting APISIX
        - name: wait-etcd
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z etcd-service.apisix.svc.cluster.local 2379; do
                echo "Waiting for etcd..."; sleep 2
              done
              echo "etcd is ready"
        # Wait for Redis to be ready
        - name: wait-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h redis-service.apisix.svc.cluster.local -p 6379 ping; do
                echo "Waiting for Redis..."; sleep 2
              done
              echo "Redis is ready"
      containers:
        - name: apisix
          image: apache/apisix:3.9.0-debian
          ports:
            - name: http
              containerPort: 9080
            - name: admin
              containerPort: 9180
            - name: metrics
              containerPort: 9091
          volumeMounts:
            - name: apisix-config
              mountPath: /usr/local/apisix/conf/config.yaml
              subPath: config.yaml
            # Fresh emptyDir on every pod start — prevents stale worker_events.sock
            - name: apisix-logs
              mountPath: /usr/local/apisix/logs
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: apisix-config
          configMap:
            name: apisix-config
        - name: apisix-logs
          emptyDir: {}
---
# Gateway traffic — accessible from outside on port 30080
apiVersion: v1
kind: Service
metadata:
  name: apisix-gateway
  namespace: apisix
spec:
  type: NodePort
  selector:
    app: apisix
  ports:
    - name: http
      port: 9080
      targetPort: 9080
      nodePort: 30080
---
# Admin API — accessible on port 30180 (for route configuration)
apiVersion: v1
kind: Service
metadata:
  name: apisix-admin
  namespace: apisix
spec:
  type: NodePort
  selector:
    app: apisix
  ports:
    - name: admin
      port: 9180
      targetPort: 9180
      nodePort: 30180
---
# Prometheus metrics — Dockerized Prometheus scrapes NodePort 30091
apiVersion: v1
kind: Service
metadata:
  name: apisix-metrics
  namespace: apisix
spec:
  type: NodePort
  selector:
    app: apisix
  ports:
    - name: metrics
      port: 9091
      targetPort: 9091
      nodePort: 30091
