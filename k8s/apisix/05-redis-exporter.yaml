# ─────────────────────────────────────────────────────────
#  Redis Exporter — exposes Redis metrics for Prometheus
#  NodePort 30121 → scraped by Dockerized Prometheus
# ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: apisix
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.62.0-alpine
          env:
            - name: REDIS_ADDR
              value: "redis://redis-service.apisix.svc.cluster.local:6379"
          ports:
            - name: metrics
              containerPort: 9121
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9121
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9121
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter-service
  namespace: apisix
spec:
  type: NodePort
  selector:
    app: redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: 9121
      nodePort: 30121
