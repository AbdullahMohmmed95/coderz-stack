# ─────────────────────────────────────────────────────────
#  APISIX Dashboard — Web UI
#  NodePort 30900 → http://109.199.120.120:30900
#  Login: admin / coderz123
# ─────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: apisix
data:
  conf.yaml: |
    conf:
      listen:
        host: 0.0.0.0
        port: 9001
      log:
        error_log:
          level: warn
          file_path: /dev/stderr
        access_log:
          file_path: /dev/stdout
      etcd:
        endpoints:
          - http://etcd-service.apisix.svc.cluster.local:2379
        prefix: /apisix
        username: ~
        password: ~

    authentication:
      secert: coderz-dashboard-secret-2024
      expire_time: 3600
      users:
        - username: admin
          password: coderz123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix-dashboard
  namespace: apisix
  labels:
    app: apisix-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apisix-dashboard
  template:
    metadata:
      labels:
        app: apisix-dashboard
    spec:
      initContainers:
        - name: wait-etcd
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z etcd-service.apisix.svc.cluster.local 2379; do
                echo "Waiting for etcd..."; sleep 2
              done
              echo "etcd is ready"
      containers:
        - name: apisix-dashboard
          image: apache/apisix-dashboard:3.0.0-alpine
          ports:
            - name: ui
              containerPort: 9001
          volumeMounts:
            - name: dashboard-config
              mountPath: /usr/local/apisix-dashboard/conf/conf.yaml
              subPath: conf.yaml
          readinessProbe:
            httpGet:
              path: /ping
              port: 9001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 9001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: dashboard-config
          configMap:
            name: dashboard-config
---
apiVersion: v1
kind: Service
metadata:
  name: apisix-dashboard
  namespace: apisix
spec:
  type: NodePort
  selector:
    app: apisix-dashboard
  ports:
    - name: ui
      port: 9001
      targetPort: 9001
      nodePort: 30900
