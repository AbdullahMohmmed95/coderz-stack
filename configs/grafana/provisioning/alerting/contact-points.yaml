apiVersion: 1

contactPoints:
  - orgId: 1
    name: coderz-email
    receivers:
      - uid: coderz-email-recv
        type: email
        settings:
          addresses: aboodm7med1995@gmail.com
          singleEmail: false
          subject: "[Coderz] {{ .GroupLabels.alertname }} — {{ .Status | toUpper }}"
          message: |
            {{ range .Alerts }}
            Alert: {{ .Annotations.summary }}
            Description: {{ .Annotations.description }}
            Severity: {{ .Labels.severity }}
            State: {{ .Status | toUpper }}
            Started: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
            {{ if eq .Status "resolved" }}Resolved: {{ .EndsAt.Format "2006-01-02 15:04:05 UTC" }}{{ end }}
            ---
            {{ end }}
        disableResolveMessage: false
