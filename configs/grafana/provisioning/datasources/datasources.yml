apiVersion: 1
datasources:
  - name: Prometheus
    uid: PBFA97CFB590B2093
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    uid: P8E80F9AEF21F6940
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      timeout: 60

  - name: Elasticsearch
    uid: P31C819B24CF3C3C7
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "filebeat-*"
    jsonData:
      timeField: "@timestamp"
      esVersion: "8.0.0"
    editable: true

  - name: OTel Logs
    uid: OTEL_LOGS_ES
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "coderz-otel-logs*"
    jsonData:
      timeField: "@timestamp"
      esVersion: "8.0.0"
      logMessageField: "Body"
      logLevelField: "SeverityText"
    editable: true

  - name: OTel Traces
    uid: OTEL_TRACES_ES
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "coderz-otel-traces*"
    jsonData:
      timeField: "@timestamp"
      esVersion: "8.0.0"
    editable: true

  - name: CoderAPI DB
    uid: PGSQL_CODERAPI
    type: postgres
    access: proxy
    url: coderz-db:5432
    database: coderapi
    user: coderapi
    secureJsonData:
      password: coderapi_2024
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
    editable: true
