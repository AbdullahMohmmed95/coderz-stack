# ─────────────────────────────────────────────────────────
#   OpenTelemetry Collector — Coderz Stack
#   Receives OTLP from .NET API →
#     traces/logs → Elasticsearch (viewable in Kibana)
#     metrics     → Prometheus remote_write
# ─────────────────────────────────────────────────────────

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: upsert

exporters:
  # ── Traces + Logs → Elasticsearch (Kibana data views) ──
  elasticsearch:
    endpoints: [http://elasticsearch:9200]
    traces_index: coderz-otel-traces
    logs_index: coderz-otel-logs
    flush:
      interval: 5s

  # ── Metrics → Prometheus (remote_write) ──
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [elasticsearch]

    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [elasticsearch]

    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheusremotewrite]
