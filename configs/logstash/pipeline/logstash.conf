input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json
  }
}

filter {

  # ── Resolve container name from Docker API via socket ─────────────────────
  if [log][file][path] =~ /\/docker\/containers\// {
    ruby {
      code => '
        begin
          path = event.get("[log][file][path]") || ""
          parts = path.split("/")
          container_id = parts[5]
          next unless container_id && container_id.length == 64

          require "socket"
          require "json"

          sock = UNIXSocket.new("/var/run/docker.sock")
          sock.write("GET /containers/#{container_id}/json HTTP/1.0\r\nHost: localhost\r\n\r\n")
          raw = sock.read
          sock.close

          body = raw.split("\r\n\r\n", 2)[1] || "{}"
          info = JSON.parse(body)
          name = (info["Name"] || "").sub(/^\//, "")
          image = (info.dig("Config", "Image") || "")

          event.set("container_name", name)  unless name.empty?
          event.set("container_image", image) unless image.empty?
        rescue => e
          event.set("docker_lookup_error", e.message)
        end
      '
    }
  }

  # ── Fallback: use Filebeat ECS container fields ────────────────────────────
  if [container][name] and ![container_name] {
    mutate {
      add_field => { "container_name" => "%{[container][name]}" }
    }
  }

  # ── Detect API containers and parse their structured JSON logs ─────────────
  if [container_name] == "coderz-dotnet-api" or [container_name] == "coderz-webapp" {

    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "api"
        skip_on_invalid_json => true
      }

      # Promote all API log fields to top level
      if [api] {
        mutate {
          rename => {
            "[api][@timestamp]"    => "api_timestamp"
            "[api][level]"         => "level"
            "[api][service]"       => "service"
            "[api][client_ip]"     => "client_ip"
            "[api][http_method]"   => "http_method"
            "[api][http_path]"     => "http_path"
            "[api][http_query]"    => "http_query"
            "[api][http_status]"   => "http_status"
            "[api][duration_ms]"   => "duration_ms"
            "[api][user_agent]"    => "user_agent"
            "[api][error_type]"    => "error_type"
            "[api][error_message]" => "error_message"
            "[api][error_location]"=> "error_location"
            "[api][error_stack]"   => "error_stack"
          }
        }

        # Use the API's own timestamp as the event time
        if [api_timestamp] {
          date {
            match => [ "api_timestamp", "ISO8601" ]
            target => "@timestamp"
          }
          mutate { remove_field => ["api_timestamp"] }
        }

        mutate { remove_field => ["api"] }

        # Convert http_status to integer if it came as string
        mutate {
          convert => {
            "http_status"  => "integer"
            "duration_ms"  => "integer"
          }
        }

        # Tag slow requests (> 1000ms)
        if [duration_ms] and [duration_ms] > 1000 {
          mutate { add_tag => ["slow_request"] }
        }

        # Tag by HTTP status class
        if [http_status] {
          if [http_status] >= 500 {
            mutate { add_tag => ["server_error"] }
          } else if [http_status] >= 400 {
            mutate { add_tag => ["client_error"] }
          } else if [http_status] >= 200 and [http_status] < 300 {
            mutate { add_tag => ["success"] }
          }
        }

        # Drop health/metrics noise from API logs
        if [http_path] == "/api/health" or [http_path] == "/health" or [http_path] == "/metrics" {
          drop { }
        }

        mutate { remove_field => ["agent", "ecs", "input"] }
      }
    }
  }

  # ── Detect and parse Nginx gateway JSON access logs ───────────────────────
  else if [container_name] == "coderz-nginx" and [message] =~ /^\{/ {
    json {
      source => "message"
      target => "nginx"
      skip_on_invalid_json => true
    }

    if [nginx] {
      mutate {
        rename => {
          "[nginx][service]"      => "service"
          "[nginx][client_ip]"    => "client_ip"
          "[nginx][http_method]"  => "http_method"
          "[nginx][http_path]"    => "http_path"
          "[nginx][http_query]"   => "http_query"
          "[nginx][http_status]"  => "http_status"
          "[nginx][duration_ms]"  => "duration_ms"
          "[nginx][upstream]"     => "upstream"
          "[nginx][cache_status]" => "cache_status"
          "[nginx][http_user_agent]" => "user_agent"
        }
      }

      mutate {
        convert => {
          "http_status"  => "integer"
          "duration_ms"  => "float"
        }
      }

      if [http_status] and [http_status] >= 500 {
        mutate { add_tag => ["server_error"] }
      } else if [http_status] and [http_status] >= 400 {
        mutate { add_tag => ["client_error"] }
      }

      if [http_status] == 429 {
        mutate { add_tag => ["rate_limited"] }
      }

      if [cache_status] == "HIT" {
        mutate { add_tag => ["cache_hit"] }
      } else if [cache_status] == "MISS" {
        mutate { add_tag => ["cache_miss"] }
      }

      mutate { remove_field => ["nginx", "agent", "ecs", "input"] }
    }
  }

  # ── All other containers — general JSON message parsing ───────────────────
  else {
    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "json_payload"
        skip_on_invalid_json => true
      }
      if [json_payload][level] {
        mutate { add_field => { "log_level" => "%{[json_payload][level]}" } }
      }
      if [json_payload][msg] {
        mutate { add_field => { "log_msg" => "%{[json_payload][msg]}" } }
      }
    }

    # ── Syslog format ──────────────────────────────────────────────────────
    if [type] == "syslog" or [log][file][path] =~ /\/var\/log\/(syslog|auth\.log|kern\.log|messages)/ {
      grok {
        match => {
          "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}"
        }
        overwrite => ["message"]
      }
      date {
        match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
      }
      mutate { add_field => { "log_type" => "syslog" } }
    }

    # ── Tag severity from message text ────────────────────────────────────
    if [message] =~ /(?i)(error|exception|fatal|critical)/ {
      mutate { add_field => { "severity" => "error" } }
    } else if [message] =~ /(?i)(warn|warning)/ {
      mutate { add_field => { "severity" => "warning" } }
    } else {
      mutate { add_field => { "severity" => "info" } }
    }

    mutate {
      remove_field => ["agent", "ecs", "input"]
    }
  }

}

output {
  # ── API logs → dedicated index for Kibana API Logs data view ──────────────
  if [service] == "coderz-dotnet-api" or [service] == "coderz-webapp" or [service] == "nginx-gateway" {
    elasticsearch {
      hosts  => ["elasticsearch:9200"]
      index  => "api-logs-%{+YYYY.MM.dd}"
      action => "index"
    }
  }

  # ── All logs → default beat index ─────────────────────────────────────────
  elasticsearch {
    hosts  => ["elasticsearch:9200"]
    index  => "%{[@metadata][beat]}-%{[@metadata][version]}-%{+YYYY.MM.dd}"
    action => "index"
  }
}
