# ── Custom command definitions ────────────────────────────────────────────────

# HTTP check on a specific port and path  (ARG1=port, ARG2=path)
define command {
    command_name    check_http_port
    command_line    $USER1$/check_http -H 109.199.120.120 -p $ARG1$ -u $ARG2$ -t 10 --expect="200,301,302,307,401,403"
}

# HTTP check accepting 404 as OK (for APIs that return 404 on root but are alive)
define command {
    command_name    check_http_port_404ok
    command_line    $USER1$/check_http -H 109.199.120.120 -p $ARG1$ -u $ARG2$ -t 10 --expect="200,301,302,404,401,403"
}

# HTTPS check on a specific port and path  (ARG1=port, ARG2=path)
define command {
    command_name    check_https_port
    command_line    $USER1$/check_http -H 109.199.120.120 -p $ARG1$ -u $ARG2$ -t 10 -S --expect="200,301,302,307,401,403" --ssl-ignore-any-err
}

# TCP port open  (ARG1=port)
define command {
    command_name    check_tcp_port
    command_line    $USER1$/check_tcp -H 109.199.120.120 -p $ARG1$ -t 10
}

# Disk on mounted host filesystem  (ARG1=warn%, ARG2=crit%, ARG3=path)
define command {
    command_name    check_disk_host
    command_line    $USER1$/check_disk -w $ARG1$ -c $ARG2$ -p $ARG3$
}

# Memory via host /proc/meminfo  (ARG1=warn%, ARG2=crit%)
define command {
    command_name    check_mem
    command_line    /bin/bash -c 'total=$(grep MemTotal /hostfs/proc/meminfo | awk "{print \$2}"); avail=$(grep MemAvailable /hostfs/proc/meminfo | awk "{print \$2}"); used=$((total - avail)); pct=$((used * 100 / total)); warn=$ARG1$; crit=$ARG2$; used_mb=$((used / 1024)); total_mb=$((total / 1024)); if [ $pct -ge $crit ]; then echo "CRITICAL: Memory $pct% used ($used_mb MB / $total_mb MB)|memusage=$pct%;$warn;$crit;0;100"; exit 2; elif [ $pct -ge $warn ]; then echo "WARNING: Memory $pct% used ($used_mb MB / $total_mb MB)|memusage=$pct%;$warn;$crit;0;100"; exit 1; else echo "OK: Memory $pct% used ($used_mb MB / $total_mb MB)|memusage=$pct%;$warn;$crit;0;100"; exit 0; fi'
}

# CPU load from host /proc/loadavg  (ARG1=w1,w5,w15  ARG2=c1,c5,c15)
define command {
    command_name    check_load_host
    command_line    /bin/bash -c 'read l1 l5 l15 _ < /hostfs/proc/loadavg; w1=$(echo $ARG1$ | cut -d, -f1); w5=$(echo $ARG1$ | cut -d, -f2); w15=$(echo $ARG1$ | cut -d, -f3); c1=$(echo $ARG2$ | cut -d, -f1); c5=$(echo $ARG2$ | cut -d, -f2); c15=$(echo $ARG2$ | cut -d, -f3); code=0; msg="OK"; for pair in "$l1:$w1:$c1" "$l5:$w5:$c5" "$l15:$w15:$c15"; do v=$(echo $pair|cut -d: -f1); w=$(echo $pair|cut -d: -f2); c=$(echo $pair|cut -d: -f3); if (( $(echo "$v >= $c" | bc -l) )); then msg="CRITICAL"; code=2; elif (( $(echo "$v >= $w" | bc -l) )) && [ $code -lt 2 ]; then msg="WARNING"; code=1; fi; done; echo "$msg - load avg: $l1 $l5 $l15|load1=$l1;$w1;$c1 load5=$l5;$w5;$c5 load15=$l15;$w15;$c15"; exit $code'
}
