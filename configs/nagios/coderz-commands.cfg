# ── Custom command definitions ────────────────────────────────────────────────

# Check HTTP on a specific port and path  (ARG1=port, ARG2=path)
define command {
    command_name    check_http_port
    command_line    $USER1$/check_http -H 109.199.120.120 -p $ARG1$ -u $ARG2$ -t 10 --expect="200,301,302,401,403"
}

# Check TCP port open  (ARG1=port)
define command {
    command_name    check_tcp_port
    command_line    $USER1$/check_tcp -H 109.199.120.120 -p $ARG1$ -t 10
}

# Check disk on mounted host filesystem  (ARG1=warn%, ARG2=crit%, ARG3=path)
define command {
    command_name    check_disk_host
    command_line    $USER1$/check_disk -w $ARG1$ -c $ARG2$ -p $ARG3$
}

# Check memory via host /proc/meminfo  (ARG1=warn% used, ARG2=crit% used)
define command {
    command_name    check_mem
    command_line    /bin/bash -c 'total=$(grep MemTotal /hostfs/proc/meminfo | awk "{print \$2}"); avail=$(grep MemAvailable /hostfs/proc/meminfo | awk "{print \$2}"); used=$((total - avail)); pct=$((used * 100 / total)); warn=$ARG1$; crit=$ARG2$; used_mb=$((used / 1024)); total_mb=$((total / 1024)); if [ $pct -ge $crit ]; then echo "CRITICAL: Memory $pct% used ($used_mb MB / $total_mb MB)|memusage=$pct%;$warn;$crit;0;100"; exit 2; elif [ $pct -ge $warn ]; then echo "WARNING: Memory $pct% used ($used_mb MB / $total_mb MB)|memusage=$pct%;$warn;$crit;0;100"; exit 1; else echo "OK: Memory $pct% used ($used_mb MB / $total_mb MB)|memusage=$pct%;$warn;$crit;0;100"; exit 0; fi'
}

# Check CPU load reading from host /proc/loadavg  (ARG1=w5,w10,w15  ARG2=c5,c10,c15)
define command {
    command_name    check_load_host
    command_line    /bin/bash -c 'load=$(cat /hostfs/proc/loadavg); l1=$(echo $load | cut -d" " -f1); l5=$(echo $load | cut -d" " -f2); l15=$(echo $load | cut -d" " -f3); w1=$(echo $ARG1$ | cut -d, -f1); w5=$(echo $ARG1$ | cut -d, -f2); w15=$(echo $ARG1$ | cut -d, -f3); c1=$(echo $ARG2$ | cut -d, -f1); c5=$(echo $ARG2$ | cut -d, -f2); c15=$(echo $ARG2$ | cut -d, -f3); status="OK"; code=0; if (( $(echo "$l1 >= $c1" | bc -l) || $(echo "$l5 >= $c5" | bc -l) || $(echo "$l15 >= $c15" | bc -l) )); then status="CRITICAL"; code=2; elif (( $(echo "$l1 >= $w1" | bc -l) || $(echo "$l5 >= $w5" | bc -l) || $(echo "$l15 >= $w15" | bc -l) )); then status="WARNING"; code=1; fi; echo "$status - load average: $l1, $l5, $l15|load1=$l1;$w1;$c1 load5=$l5;$w5;$c5 load15=$l15;$w15;$c15"; exit $code'
}
