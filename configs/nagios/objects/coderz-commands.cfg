# Coderz custom Nagios commands

# HTTP check on a specific port and path  (ARG1=port, ARG2=path)
define command {
    command_name    check_http_port
    command_line    $USER1$/check_http -H 109.199.120.120 -p $ARG1$ -u $ARG2$ -t 10 --expect="200,301,302,307,401,403"
}

# HTTP check accepting 404 as OK (gateway returns 404 on root but is alive)
define command {
    command_name    check_http_port_404ok
    command_line    $USER1$/check_http -H 109.199.120.120 -p $ARG1$ -u $ARG2$ -t 10 --expect="200,301,302,404,401,403"
}

# HTTPS check on a specific port and path  (ARG1=port, ARG2=path)
define command {
    command_name    check_https_port
    command_line    $USER1$/check_http -H 109.199.120.120 -p $ARG1$ -u $ARG2$ -t 10 -S --expect="200,301,302,307,401,403" --ssl-ignore-any-err
}

# TCP port open  (ARG1=port)
define command {
    command_name    check_tcp_port
    command_line    $USER1$/check_tcp -H 109.199.120.120 -p $ARG1$ -t 10
}

# CPU load — container shares host kernel load average  (ARG1=w1,w5,w15  ARG2=c1,c5,c15)
define command {
    command_name    check_load_host
    command_line    $USER1$/check_load -w $ARG1$ -c $ARG2$
}

# Disk on mounted host filesystem  (ARG1=warn%, ARG2=crit%, ARG3=path)
define command {
    command_name    check_disk_host
    command_line    $USER1$/check_disk -w $ARG1$ -c $ARG2$ -p $ARG3$
}

# Memory via host /proc/meminfo  (ARG1=warn%, ARG2=crit%)
define command {
    command_name    check_mem
    command_line    /opt/nagios/libexec/check_mem.pl -u -w $ARG1$ -c $ARG2$
}

# Swap check  (ARG1=warn%, ARG2=crit%)
define command {
    command_name    check_swap
    command_line    $USER1$/check_swap -w $ARG1$ -c $ARG2$
}
