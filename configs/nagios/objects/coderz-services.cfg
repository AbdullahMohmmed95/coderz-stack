# Coderz Stack — Nagios Service Checks

# System Resources
define service {
    host_name coderz-server
    service_description CPU Load
    check_command check_load_host!5.0,4.0,3.0!10.0,8.0,6.0
    check_interval 1
    retry_interval 1
    max_check_attempts 3
    check_period 24x7
    notification_interval 30
    notification_period 24x7
    contact_groups admins
}

