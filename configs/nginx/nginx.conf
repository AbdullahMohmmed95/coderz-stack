worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Structured JSON access log (parsed by Filebeat → Logstash → Kibana) ────
  log_format json_gateway escape=json
    '{'
      '"@timestamp":"$time_iso8601",'
      '"service":"nginx-gateway",'
      '"client_ip":"$remote_addr",'
      '"http_method":"$request_method",'
      '"http_path":"$uri",'
      '"http_query":"$args",'
      '"http_status":$status,'
      '"duration_ms":$request_time,'
      '"bytes_sent":$bytes_sent,'
      '"http_user_agent":"$http_user_agent",'
      '"upstream":"$upstream_addr",'
      '"cache_status":"$upstream_cache_status"'
    '}';

  access_log /var/log/nginx/access.log json_gateway;
  error_log  /var/log/nginx/error.log warn;

  # ── Rate Limiting — 20 req/s per IP, burst 40 ──────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_zone:10m rate=20r/s;
  limit_req_status 429;

  # ── Proxy Cache — 200MB in-memory zone, 2GB disk, 10min inactive TTL ───────
  proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=api_cache:50m
    inactive=10m
    max_size=500m
    use_temp_path=off;

  # ── HTTP ────────────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Landing page (no cache, no rate limit)
    location / {
      try_files $uri $uri/ /index.html;
    }

    # .NET API Gateway — /dotnet/* → coderz-dotnet-api
    location /dotnet/ {
      # Rate limiting
      limit_req zone=api_zone burst=40 nodelay;

      # Response cache (GET only, 60s TTL)
      proxy_cache            api_cache;
      proxy_cache_methods    GET HEAD;
      proxy_cache_valid      200 60s;
      proxy_cache_valid      404 10s;
      proxy_cache_bypass     $http_pragma $http_authorization;
      proxy_no_cache         $http_pragma $http_authorization;
      add_header             X-Cache-Status $upstream_cache_status always;

      proxy_pass             http://coderz-dotnet-api:8080/;
      proxy_set_header       Host              $host;
      proxy_set_header       X-Real-IP         $remote_addr;
      proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto $scheme;
      proxy_read_timeout     60s;
    }

    # Web (Python) API Gateway — /webapp/* → coderz-webapp
    location /webapp/ {
      limit_req zone=api_zone burst=40 nodelay;

      proxy_cache            api_cache;
      proxy_cache_methods    GET HEAD;
      proxy_cache_valid      200 30s;
      proxy_cache_valid      404 10s;
      proxy_cache_bypass     $http_pragma $http_authorization;
      proxy_no_cache         $http_pragma $http_authorization;
      add_header             X-Cache-Status $upstream_cache_status always;

      proxy_pass             http://coderz-webapp:8080/;
      proxy_set_header       Host              $host;
      proxy_set_header       X-Real-IP         $remote_addr;
      proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto $scheme;
      proxy_read_timeout     60s;
    }

    # Rate limit exceeded response
    error_page 429 @rate_limited;
    location @rate_limited {
      default_type application/json;
      return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Max 20 req/s per IP.","retry_after":1}';
    }
  }

  # ── HTTPS ───────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location /dotnet/ {
      limit_req zone=api_zone burst=40 nodelay;

      proxy_cache            api_cache;
      proxy_cache_methods    GET HEAD;
      proxy_cache_valid      200 60s;
      proxy_cache_bypass     $http_pragma $http_authorization;
      proxy_no_cache         $http_pragma $http_authorization;
      add_header             X-Cache-Status $upstream_cache_status always;

      proxy_pass         http://coderz-dotnet-api:8080/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 60s;
    }

    location /webapp/ {
      limit_req zone=api_zone burst=40 nodelay;

      proxy_cache            api_cache;
      proxy_cache_methods    GET HEAD;
      proxy_cache_valid      200 30s;
      proxy_cache_bypass     $http_pragma $http_authorization;
      proxy_no_cache         $http_pragma $http_authorization;
      add_header             X-Cache-Status $upstream_cache_status always;

      proxy_pass         http://coderz-webapp:8080/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 60s;
    }

    error_page 429 @rate_limited;
    location @rate_limited {
      default_type application/json;
      return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Max 20 req/s per IP.","retry_after":1}';
    }
  }
}
